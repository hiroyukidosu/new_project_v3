name: medication_alarm_app
description: 24時間設定可能で確実に動作する服用アラームアプリ

publish_to: 'none'
version: 1.0.7+10

environment:
  sdk: '>=3.0.0 <3.8.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  
  # 🔔 通知システム
  flutter_local_notifications: ^17.2.3
  alarm: ^3.1.7
  
  # 📱 システム連携
  permission_handler: ^11.4.0
  device_info_plus: ^11.3.0
  package_info_plus: ^8.3.1
  
  
  # 💾 データ管理（Flutter 3.29.3対応）
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  
  # 🚀 高性能データベース（大量データ対応）
  # isar: ^3.1.0+1
  # isar_flutter_libs: ^3.1.0+1
  
  # 📅 日付・時間管理
  timezone: ^0.9.2
  
  # 🎨 UI・状態管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  cupertino_icons: ^1.0.8
  expandable: ^5.0.1
  
  # 🛠️ ユーティリティ（Flutter 3.29.3対応）
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  
  # 🎵 音声再生
  audioplayers: ^6.4.0
  
  # 📳 バイブレーション
  vibration: ^2.1.0
  
  
  # 📊 服薬管理機能
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  share_plus: ^7.2.1
  cross_file: ^0.3.3
  
  # ☁️ クラウド同期機能
  firebase_core: ^2.32.0
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_crashlytics: ^3.4.9
  
  # 💳 アプリ内課金機能
  in_app_purchase: ^3.1.13
  # isar_generator: ^3.1.0+1
  
  # 🔐 セキュアストレージ
  flutter_secure_storage: ^9.2.2
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.11
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/sounds/default.mp3
    - assets/sounds/gentle.mp3
    - assets/sounds/urgent.mp3
    - assets/sounds/classic.mp3
    - assets/sounds/loop_notification.mp3
    - assets/sounds/single_notification.mp3
    - assets/sounds/short_loop.mp3
    - assets/sounds/long_loop.mp3
    - assets/icon/
    - assets/icon/sp.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/sp.png
  android: true
  ios: true
  android_12:
    image: assets/icon/sp.png
    color: "#FFFFFF"